apiVersion: v1
kind: Namespace
metadata:
  name: suilens-yournpm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-db
  namespace: suilens-yournpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: catalog
            - name: POSTGRES_PASSWORD
              value: catalog
            - name: POSTGRES_DB
              value: catalog
          volumeMounts:
            - name: catalog-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: catalog-db-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: suilens-yournpm
spec:
  selector:
    app: catalog-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: suilens-yournpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: orders
            - name: POSTGRES_PASSWORD
              value: orders
            - name: POSTGRES_DB
              value: orders
          volumeMounts:
            - name: order-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: order-db-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: suilens-yournpm
spec:
  selector:
    app: order-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-db
  namespace: suilens-yournpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-db
  template:
    metadata:
      labels:
        app: notification-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: notifications
            - name: POSTGRES_PASSWORD
              value: notifications
            - name: POSTGRES_DB
              value: notifications
          volumeMounts:
            - name: notification-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: notification-db-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: notification-db
  namespace: suilens-yournpm
spec:
  selector:
    app: notification-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: suilens-yournpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: suilens-yournpm
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: suilens-yournpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: suilens/catalog-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: postgres://catalog:catalog@catalog-db:5432/catalog
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: suilens-yournpm
spec:
  selector:
    app: catalog-service
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: suilens-yournpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: suilens/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              value: postgres://orders:orders@order-db:5432/orders
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:3001
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: suilens-yournpm
spec:
  selector:
    app: order-service
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: suilens-yournpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: suilens/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          env:
            - name: DATABASE_URL
              value: postgres://notifications:notifications@notification-db:5432/notifications
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: suilens-yournpm
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 3003
      targetPort: 3003
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: suilens-yournpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: suilens/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: VITE_CATALOG_API
              value: http://localhost:3001
            - name: VITE_ORDER_API
              value: http://localhost:3002
            - name: VITE_NOTIFICATION_WS
              value: ws://localhost:3003/ws
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: suilens-yournpm
spec:
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
